name: Release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  check-version:
    name: Verify release tag matches VERSION
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compare tag to internal/version/VERSION
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: ./scripts/check-version.sh "$RELEASE_TAG"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run version package tests
        run: go test ./internal/version/...

  build:
    name: Build ${{ matrix.asset }}
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm64
            asset: velocity-test-mobile-macos-arm64
          - goarch: amd64
            asset: velocity-test-mobile-macos-x86_64
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.asset }} .

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
